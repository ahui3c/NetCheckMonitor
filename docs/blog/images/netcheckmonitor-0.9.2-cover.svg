  <text x="80" y="840" font-family="Segoe UI, Microsoft JhengHei, sans-serif" font-size="24" fill="#acd0dc">github.com/ahui3c/NetCheckMonitor</text>
  <text x="1520" y="840" text-anchor="end" font-family="Segoe UI, Microsoft JhengHei, sans-serif" font-size="24" fill="#acd0dc">作者：廖阿輝</text>
