  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="800" y="78" text-anchor="middle" font-family="Segoe UI, Microsoft JhengHei, sans-serif" font-size="49" font-weight="800" fill="#fff">從連線檢查到報表與雲端備份</text>
  <text x="800" y="122" text-anchor="middle" font-family="Segoe UI, Microsoft JhengHei, sans-serif" font-size="24" fill="#bcd7e3">NetCheckMonitor 將長時間監控資料轉換成可閱讀、可交付、可保存的紀錄</text>

  <g transform="translate(75 190)" filter="url(#shadow)">
