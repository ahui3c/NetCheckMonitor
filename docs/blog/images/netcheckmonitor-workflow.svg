    <text x="36" y="119" font-family="Segoe UI, Microsoft JhengHei, sans-serif" font-size="21" fill="#456174">每次結果即時寫入 CSV，</text>
    <text x="36" y="153" font-family="Segoe UI, Microsoft JhengHei, sans-serif" font-size="21" fill="#456174">降低誤關或當機的損失。</text>
    <rect x="36" y="177" width="174" height="28" rx="14" fill="#e7faf6"/><text x="123" y="198" text-anchor="middle" font-family="Segoe UI, Microsoft JhengHei, sans-serif" font-size="16" font-weight="700" fill="#098979">暫停時段不納入統計</text>
  </g>
  <path d="M832 300h82" stroke="#51ded1" stroke-width="6" marker-end="url(#arrow)"/>

  <g transform="translate(935 190)" filter="url(#shadow)">
