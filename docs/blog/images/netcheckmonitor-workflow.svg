    <text x="36" y="153" font-family="Segoe UI, Microsoft JhengHei, sans-serif" font-size="21" fill="#456174">斷線時間／百分比統計。</text>
    <rect x="36" y="177" width="174" height="28" rx="14" fill="#f2edff"/><text x="123" y="198" text-anchor="middle" font-family="Segoe UI, Microsoft JhengHei, sans-serif" font-size="16" font-weight="700" fill="#6847b2">即時或結束後產生</text>
  </g>
  <path d="M1262 300h82" stroke="#51ded1" stroke-width="6" marker-end="url(#arrow)"/>

