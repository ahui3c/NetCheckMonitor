    <text x="36" y="119" font-family="Segoe UI, Microsoft JhengHei, sans-serif" font-size="21" fill="#456174">每 60 秒測試對外連線，</text>
    <text x="36" y="153" font-family="Segoe UI, Microsoft JhengHei, sans-serif" font-size="21" fill="#456174">記錄正常、斷線與延遲。</text>
    <rect x="36" y="177" width="174" height="28" rx="14" fill="#e5f1ff"/><text x="123" y="198" text-anchor="middle" font-family="Segoe UI, Microsoft JhengHei, sans-serif" font-size="16" font-weight="700" fill="#1974cf">避免監控期間休眠</text>
  </g>
  <path d="M402 300h82" stroke="#51ded1" stroke-width="6" marker-end="url(#arrow)"/>

  <g transform="translate(505 190)" filter="url(#shadow)">
