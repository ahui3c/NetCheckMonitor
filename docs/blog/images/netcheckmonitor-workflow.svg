    <circle cx="58" cy="58" r="32" fill="#e7faf6"/><path d="M44 42h28l13 13v42H44z" fill="none" stroke="#099a88" stroke-width="5"/><path d="M72 42v15h13M52 72h24M52 84h24" fill="none" stroke="#099a88" stroke-width="4"/>
